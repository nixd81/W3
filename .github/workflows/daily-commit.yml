name: Daily Commit

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  daily-commit-job:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update daily log (23f3001502@ds.study.iitm.ac.in)
        run: |
          echo "Daily run at $(date -u)" >> daily-log.txt

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions-bot@example.com"

      - name: Commit changes
        run: |
          git add daily-log.txt
          git commit -m "Daily automated commit" || echo "Nothing to commit"

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push
